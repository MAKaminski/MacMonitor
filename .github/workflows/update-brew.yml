name: Update Homebrew Cask (legacy tap)

# The in-repo Cask (Casks/macmonitor.rb) is bumped by release.yml on every tag
# and is the supported `brew install --cask macmonitor` channel. This job only
# mirrors that bump to the legacy ryyansafar/homebrew-macmonitor tap, and is a
# no-op unless HOMEBREW_TAP_TOKEN is configured — so it never auto-fails on a
# release (it used to fail in ~9s on a wrong-repo download URL).

on:
  release:
    types: [published]

jobs:
  update-cask:
    name: Bump legacy tap (skipped without token)
    runs-on: ubuntu-latest
    steps:
      - name: Check tap token
        id: gate
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$TAP_TOKEN" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
            echo "HOMEBREW_TAP_TOKEN not set — skipping legacy tap update (the in-repo cask already handles brew)."
          fi

      - name: Extract version from tag
        if: steps.gate.outputs.go == 'true'
        id: ver
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download DMG and compute SHA256
        if: steps.gate.outputs.go == 'true'
        id: sha
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/MacMonitor-${VERSION}.dmg"
          echo "Downloading: $URL"
          curl -fsSL "$URL" -o MacMonitor.dmg
          echo "sha256=$(shasum -a 256 MacMonitor.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        if: steps.gate.outputs.go == 'true'
        uses: actions/checkout@v4
        with:
          repository: ryyansafar/homebrew-macmonitor
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        if: steps.gate.outputs.go == 'true'
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          sed -i "s/  version \".*\"/  version \"${VERSION}\"/" tap/Casks/macmonitor.rb
          sed -i "s/  sha256 \".*\"/  sha256 \"${SHA}\"/"       tap/Casks/macmonitor.rb

      - name: Commit and push
        if: steps.gate.outputs.go == 'true'
        run: |
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/macmonitor.rb
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: bump macmonitor to v${{ steps.ver.outputs.version }}"
          git push
